<!DOCTYPE html>
<html dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة تعلم القرآن - Quran Learning Platform</title>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', 'Arial', sans-serif;
      background: linear-gradient(135deg, #1a472a 0%, #2d5a3d 50%, #0f3620 100%);
      min-height: 100vh;
      padding: 10px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 90vh;
    }

    /* Islamic Header */
    .header {
      background: linear-gradient(135deg, #1a472a 0%, #2d5a3d 100%);
      color: white;
      padding: 20px;
      text-align: center;
      border-bottom: 3px solid #d4af37;
      position: relative;
    }

    .header::before {
      content: '✦ ✦ ✦';
      display: block;
      font-size: 12px;
      letter-spacing: 8px;
      margin-bottom: 8px;
      opacity: 0.8;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      margin: 5px 0;
    }

    .header p {
      font-size: 12px;
      opacity: 0.9;
    }

    /* Form Section */
    .form-section {
      padding: 20px;
      border-bottom: 1px solid #e0e0e0;
      background: #f9f7f4;
    }

    .form-section h2 {
      color: #1a472a;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.3s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #d4af37;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      background: linear-gradient(135deg, #1a472a 0%, #2d5a3d 100%);
      color: white;
      border: 2px solid #1a472a;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    button:hover {
      background: linear-gradient(135deg, #2d5a3d 0%, #1a472a 100%);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(26, 71, 42, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    /* Salas List */
    #salasList {
      padding: 10px;
      max-height: 150px;
      overflow-y: auto;
    }

    .sala-btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      background: white;
      border: 2px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      font-weight: 500;
      color: #1a472a;
      transition: all 0.2s;
    }

    .sala-btn:hover {
      border-color: #d4af37;
      background: #f9f7f4;
    }

    .sala-btn:active {
      background: #ede8e0;
    }

    /* Chat Section */
    .chat-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #f9f7f4;
      padding: 15px;
      border-bottom: 2px solid #e0e0e0;
      font-weight: 600;
      color: #1a472a;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      background: white;
    }

    .message {
      background: #f9f7f4;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border-left: 4px solid #d4af37;
    }

    .message strong {
      color: #1a472a;
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .message span {
      color: #555;
      display: block;
    }

    /* Message Input */
    .message-input-section {
      padding: 15px;
      background: #f9f7f4;
      border-top: 2px solid #e0e0e0;
      display: flex;
      gap: 8px;
    }

    textarea {
      margin: 0 !important;
      flex: 1;
      min-height: 40px;
      max-height: 80px;
      resize: vertical;
    }

    .send-btn {
      width: auto;
      min-width: 60px;
      margin: 0 !important;
      padding: 12px 20px !important;
      align-self: flex-end;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #d4af37;
      border-radius: 3px;
    }

    @media (max-width: 600px) {
      .container {
        height: 100vh;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>منصة تعلم القرآن</h1>
      <p>Quran Learning Platform</p>
    </div>

    <!-- Form Section -->
    <div class="form-section">
      <h2>إنشاء فصل / Create Room</h2>
      <input type="text" id="salaName" placeholder="Sala name / اسم الفصل">
      <input type="text" id="salaType" placeholder="Type / النوع (general, tajweed...)">
      <input type="text" id="salaLanguage" placeholder="Language / اللغة (ar, en, es)">
      <button onclick="createSala()">إنشاء / Create</button>

      <h2 style="margin-top: 15px;">الفصول / Salas</h2>
      <div id="salasList"></div>
      <button onclick="loadSalas()">تحديث / Refresh</button>
    </div>

    <!-- Chat Section -->
    <div class="chat-section">
      <div class="chat-header" id="currentSalaName">اختر فصلاً / Select a Sala</div>
      <div id="messages"></div>
      
      <div class="message-input-section">
        <textarea id="messageInput" placeholder="اكتب رسالة... / Type message..." onkeypress="handleEnter(event)"></textarea>
        <button class="send-btn" onclick="sendMessage()">إرسال</button>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://quran-backend-production-fca4.up.railway.app';
    let socket;
    let currentSalaId;
    let userId = 'user-' + Math.random().toString(36).substr(2, 9);
    let displayName = 'Student ' + Math.floor(Math.random() * 1000);

    socket = io(BACKEND_URL + '/salas', { 
      reconnection: true, 
      transports: ['websocket', 'polling'],
      upgrade: false
    });

    socket.on('connect', () => {
      console.log('✅ Connected:', socket.id);
      loadSalas();
    });

    socket.on('new-message', (msg) => {
      if (msg.salaId === currentSalaId) addMsg(msg.displayName, msg.content);
    });

    function createSala() {
      const name = document.getElementById('salaName').value;
      const type = document.getElementById('salaType').value;
      const lang = document.getElementById('salaLanguage').value;

      if (!name || !type || !lang) {
        alert('ملء جميع الحقول / Fill all fields');
        return;
      }

      socket.emit('create-sala', { name, type, language: lang }, () => {
        document.getElementById('salaName').value = '';
        document.getElementById('salaType').value = '';
        document.getElementById('salaLanguage').value = '';
        loadSalas();
      });
    }

    function loadSalas() {
      socket.emit('get-salas', (salas) => {
        const list = document.getElementById('salasList');
        list.innerHTML = '';
        salas.forEach(s => {
          const btn = document.createElement('button');
          btn.className = 'sala-btn';
          btn.innerHTML = '<strong>' + s.name + '</strong><small>' + s.type + ' • ' + s.language + '</small>';
          btn.onclick = () => joinSala(s._id, s.name, s.members);
          list.appendChild(btn);
        });
      });
    }

    function joinSala(salaId, name, members) {
      currentSalaId = salaId;
      document.getElementById('currentSalaName').textContent = name + ' (' + members.length + ' members)';
      document.getElementById('messages').innerHTML = '';
      socket.emit('join-sala', { salaId, userId, displayName });
      socket.emit('get-messages', { salaId }, (msgs) => {
        msgs.forEach(m => addMsg(m.displayName, m.content));
      });
    }

    function sendMessage() {
      const content = document.getElementById('messageInput').value.trim();
      if (!content || !currentSalaId) return;

      socket.emit('send-message', { salaId: currentSalaId, userId, displayName, content });
      document.getElementById('messageInput').value = '';
      document.getElementById('messageInput').focus();
    }

    function handleEnter(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    function addMsg(sender, text) {
      const div = document.createElement('div');
      div.className = 'message';
      div.innerHTML = '<strong>' + sender + '</strong><span>' + text + '</span>';
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }
  </script>
</body>
</html>
